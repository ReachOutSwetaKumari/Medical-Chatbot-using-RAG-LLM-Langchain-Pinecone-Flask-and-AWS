# Replace curabot.yourdomain.com with your real domain before use.
# If you don't have a domain yet, you can temporarily use the server's
# public IP here instead, but Let's Encrypt (certbot) requires a real
# domain name to issue a certificate -- IP-only access will be HTTP only.

server {
    listen 80;
    server_name curabot.yourdomain.com;

    client_max_body_size 500M;  # matches app.py's MAX_CONTENT_LENGTH

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;   # RAG generation can take 15-25s
    }
}
